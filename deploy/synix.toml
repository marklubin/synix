[workspace]
name = "agent-memory"
pipeline_path = "pipeline.py"

# -- Agents -------------------------------------------------------------------

[agents.summarizer]
prompt_key = "summarizer"
instructions_file = "prompts/summarizer.txt"
description = "Compresses conversations into episode summaries"
provider = "openai-compatible"
model = "Qwen/Qwen3.5-2B"
base_url = "http://localhost:8100/v1"
temperature = 0.3
max_tokens = 2048

[agents.builder]
prompt_key = "builder"
instructions_file = "prompts/builder.txt"
description = "Tracks what's being built, shipped, decided technically"
provider = "openai-compatible"
model = "Qwen/Qwen3.5-2B"
base_url = "http://localhost:8100/v1"
temperature = 0.3
max_tokens = 2048

[agents.researcher]
prompt_key = "researcher"
instructions_file = "prompts/researcher.txt"
description = "Tracks what's being investigated, learned, compared"
provider = "openai-compatible"
model = "Qwen/Qwen3.5-2B"
base_url = "http://localhost:8100/v1"
temperature = 0.3
max_tokens = 2048

[agents.operator]
prompt_key = "operator"
instructions_file = "prompts/operator.txt"
description = "Tracks what needs attention, blockers, action items"
provider = "openai-compatible"
model = "Qwen/Qwen3.5-2B"
base_url = "http://localhost:8100/v1"
temperature = 0.3
max_tokens = 2048

[agents.ideator]
prompt_key = "ideator"
instructions_file = "prompts/ideator.txt"
description = "Captures ideas, connections, speculative directions"
provider = "openai-compatible"
model = "Qwen/Qwen3.5-2B"
base_url = "http://localhost:8100/v1"
temperature = 0.3
max_tokens = 2048

[agents.synthesizer]
prompt_key = "synthesizer"
instructions_file = "prompts/synthesizer.txt"
description = "Distills analysis into working memory, self-model, core memory"
provider = "openai-compatible"
model = "Qwen/Qwen3.5-2B"
base_url = "http://localhost:8100/v1"
temperature = 0.3
max_tokens = 4096

# -- Server -------------------------------------------------------------------

[server]
project_dir = "/data"
pipeline_path = "pipeline.py"
mcp_port = 8200
viewer_port = 9471

# -- Buckets ------------------------------------------------------------------

[buckets.sessions]
dir = "sources/sessions"
patterns = ["**/*.jsonl.gz", "**/*.jsonl"]
description = "Claude Code session transcripts (live, feeds folds)"

[buckets.exports]
dir = "sources/exports"
patterns = ["**/*.json"]
description = "New conversation exports (live, feeds folds)"

[buckets.backfill]
dir = "sources/backfill"
patterns = ["**/*.json", "**/*.jsonl", "**/*.jsonl.gz"]
description = "Old conversation exports (search only, no fold)"

[buckets.documents]
dir = "sources/documents"
patterns = ["**/*.md", "**/*.txt"]
description = "Notes, specs, memos (semantic, feeds folds)"

[buckets.reports]
dir = "sources/reports"
patterns = ["**/*.md"]
description = "Cron outputs, automated reports (semantic, feeds folds)"

[buckets.reference]
dir = "sources/reference"
patterns = ["**/*.md", "**/*.txt", "**/*.pdf"]
description = "Background material — research, intel, papers (search only)"

[auto_build]
enabled = true
window = 30

[vllm]
enabled = true
model = "Qwen/Qwen3.5-2B"
gpu_device = 0
port = 8100
max_model_len = 131072
gpu_memory_utilization = 0.90
