name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run pytest tests/ -v

  mcp-agent-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync
      - name: MCP live agent smoke test (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AGENT_BACKEND: openai
          AGENT_MODEL: gpt-4o
        run: uv run pytest tests/e2e/test_mcp_agent.py -k live_agent -v --log-cli-level=INFO --timeout=120

  publish:
    needs: [test, mcp-agent-smoke]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  smoke-test:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Wait for PyPI propagation
        run: sleep 30
      - name: Install synix from PyPI
        run: uv tool install synix
      - name: Verify CLI commands
        run: |
          synix --help
          synix init smoke-test
          cd smoke-test
          synix plan
